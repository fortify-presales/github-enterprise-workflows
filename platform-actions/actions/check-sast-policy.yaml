# yaml-language-server: $schema=https://fortify.github.io/fcli/schemas/action/fcli-action-schema-2.9.0.json
$schema: https://fortify.github.io/fcli/schemas/action/fcli-action-schema-2.9.0.json

author: Fortify Presales
usage:
  header: SAST policy check for FoD releases
  description: |
    Fails if New or Reopen High/Critical SAST vulnerabilities are present.

config:
  rest.target.default: fod

cli.options:
  release:
    names: --release, --rel
    description: Required release id or app[:microservice]:release

steps:
  - var.set:
      rel: ${#fod.release(cli.release)}
      blockingIssues: null
  - rest.call:
      vulnerabilities:
        uri: /api/v3/releases/${rel.releaseId}/vulnerabilities
        type: paged
        query:
          includeFixed: true
        records.for-each:
          record.var-name: issue
          if: ${issue.status!=null && (issue.status.equalsIgnoreCase('New') || issue.status.toLowerCase().startsWith('reopen')) && issue.severityString!=null && (issue.severityString.equalsIgnoreCase('Critical') || issue.severityString.equalsIgnoreCase('High')) && issue.scantype!=null && (issue.scantype.equalsIgnoreCase('Static') || issue.scantype.equalsIgnoreCase('SAST'))}
          do:
            - var.set:
                blockingIssues..: "${issue.scantype} ${issue.status} ${issue.severityString} - ${issue.category} (${issue.primaryLocationFull}${issue.lineNumber==null?'':':'+issue.lineNumber})"
  - var.set:
      blockingIssueCount: "${blockingIssues==null ? 0 : blockingIssues.size()}"
  - log.info: |
      SAST policy summary for release ${rel.applicationName}${#isNotBlank(rel.microserviceName)?' - '+rel.microserviceName:''} - ${rel.releaseName}
      Blocking issues: ${blockingIssueCount}
  - if: ${blockingIssueCount > 0}
    log.info: |
      Blocking issues:
      ${#join('\n', blockingIssues)}
  - check:
      noNewOrReopenCriticalOrHighSast:
        display-name: No New or Reopen Critical or High SAST issues
        fail.if: ${blockingIssueCount > 0}
