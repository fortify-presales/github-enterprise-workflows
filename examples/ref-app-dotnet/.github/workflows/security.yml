name: Security

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  fortify:
    uses: fortify-presales/platform-workflows/.github/workflows/reusable-fortify-fod.yml@v1
    with:
      language: dotnet
      source_dir: ./src/PlatformExampleDotnet
      build_strategy: auto
      do_sca_scan: true
      do_check_policy: true
    secrets: inherit

  sonatype:
    uses: fortify-presales/platform-workflows/.github/workflows/reusable-sonatype-sca.yml@v1
    with:
      application_id: ${{ vars.LIFECYCLE_APPLICATIONS_ID }}
      scan_targets: src/PlatformExampleDotnet/*.csproj
    secrets: inherit

  gate:
    needs: [fortify, sonatype]
    if: ${{ always() && !cancelled() }}
    uses: fortify-presales/platform-workflows/.github/workflows/reusable-security-gate.yml@v1
    with:
      required_statuses_csv: >-
        Fortify=${{ needs.fortify.result }},Sonatype=${{ needs.sonatype.result }}
