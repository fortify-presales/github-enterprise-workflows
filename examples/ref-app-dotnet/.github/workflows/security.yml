name: Security

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  sec_sast_fod:
    name: Fortify SAST (FoD)
    uses: fortify-presales/platform-workflows/.github/workflows/reusable-fortify-fod.yml@v1
    with:
      language: dotnet
      source_dir: ./src/PlatformExampleDotnet
      build_strategy: auto
      sast_assessment_type: Static Assessment
      do_aviator_audit: false
      do_aviator_remediations: false
      package_extra_opts: -bt dotnet -bf src/PlatformExampleDotnet/PlatformExampleDotnet.csproj
      do_sca_scan: true
      do_check_policy: true
    secrets: inherit

  sec_sca_sonatype:
    name: Sonatype SCA
    uses: fortify-presales/platform-workflows/.github/workflows/reusable-sonatype-sca.yml@v1
    with:
      application_id: ${{ vars.LIFECYCLE_APPLICATION_ID != '' && vars.LIFECYCLE_APPLICATION_ID || github.event.repository.name }}
      organization_id: ${{ vars.LIFECYCLE_ORGANIZATION_ID != '' && vars.LIFECYCLE_ORGANIZATION_ID || github.repository_owner }}
      create_application_if_missing: true
      scan_targets: src/PlatformExampleDotnet/*.csproj
    secrets: inherit

  sec_gate:
    name: Security Gate
    needs: [sec_sast_fod, sec_sca_sonatype]
    if: ${{ always() && !cancelled() }}
    uses: fortify-presales/platform-workflows/.github/workflows/reusable-security-gate.yml@v1
    with:
      required_statuses_csv: >-
        Fortify=${{ needs.sec_sast_fod.result }},Sonatype=${{ needs.sec_sca_sonatype.result }}
